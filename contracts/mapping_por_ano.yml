  NU_ANO: ano
  SG_UF_PROVA: SG_UF_RESIDENCIA
  TP_SEXO: TP_SEXO
  TP_PRESENCA_CN: TP_PRESENCA_CN
  TP_PRESENCA_CH: TP_PRESENCA_CH
  TP_PRESENCA_LC: TP_PRESENCA_LC
  TP_PRESENCA_MT: TP_PRESENCA_MT
  NU_NOTA_CN: NU_NOTA_CN
  NU_NOTA_CH: NU_NOTA_CH
  NU_NOTA_LC: NU_NOTA_LC
  NU_NOTA_MT: NU_NOTA_MT
  NU_NOTA_REDACAO: NU_NOTA_REDACAO
